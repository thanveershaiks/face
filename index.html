<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>AttendX - Biometric Student Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        :root {
            --bg: #0f1117; --surface: #161b27; --surface2: #1e2535; --border: #2a3f5f;
            --text: #eef2ff; --text-muted: #8fa3c0; --indigo: #6366f1; --indigo-light: #818cf8;
            --green: #10b981; --red: #f43f5e;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 420px; padding: 36px 32px; box-shadow: 0 24px 80px rgba(0,0,0,0.5); }
        .header { text-align: center; margin-bottom: 24px; }
        .logo-icon { width: 52px; height: 52px; background: var(--indigo); border-radius: 14px; display: grid; place-items: center; font-size: 1.5rem; color: #fff; margin: 0 auto 14px; font-weight: 800; }
        h2 { margin: 0 0 6px 0; font-size: 1.5rem; font-weight: 800; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); border-radius: 8px; cursor: pointer; font-weight: 600; }
        .tab-btn.active { background: var(--indigo); color: #fff; border-color: var(--indigo-light); }
        .camera-container { position: relative; width: 100%; height: 220px; background: #000; border-radius: 12px; overflow: hidden; border: 1.5px solid var(--border); margin-bottom: 20px; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .input-group { margin-bottom: 14px; }
        label { display: block; margin-bottom: 6px; font-size: 0.8rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.95rem; outline: none; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; background: var(--indigo); border: none; border-radius: 8px; color: #fff; font-weight: 700; font-size: 1rem; cursor: pointer; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #status-panel { margin-top: 15px; padding: 12px; border-radius: 8px; font-size: 0.88rem; text-align: center; display: none; font-weight: 600; }
        .status-loading { background: rgba(99,102,241,0.12); color: var(--indigo-light); border: 1px solid rgba(99,102,241,0.2); }
        .status-success { background: rgba(16,185,129,0.12); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }
        .status-error { background: rgba(244,63,94,0.12); color: var(--red); border: 1px solid rgba(244,63,94,0.2); }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <div class="logo-icon">AX</div>
        <h2 id="flow-title">Local Biometric Registration</h2>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="tab-reg" onclick="switchTab('reg')">Sign Up (Save)</button>
        <button class="tab-btn" id="tab-login" onclick="switchTab('login')">Verify Face</button>
    </div>

    <div class="camera-container">
        <video id="webcam" autoplay muted playsinline></video>
    </div>

    <div class="input-group" id="group-name">
        <label for="name">Your Full Name</label>
        <input type="text" id="name" placeholder="e.g. Rahul Das" autocomplete="off">
    </div>

    <div class="input-group">
        <label for="roll">Roll Number</label>
        <input type="text" id="roll" placeholder="e.g. B2-02" autocomplete="off">
    </div>

    <button class="btn" id="actionBtn" onclick="executeCoreBiometrics()">Scan & Save Face</button>
    <div id="status-panel"></div>
</div>

<script>
    let currentMode = 'reg';
    let modelsLoaded = false;
    let localStream = null;
    let db = null;

    // --- CONFIGURABLE ROTATION SETTINGS ---
    const QUEUE_CONFIG = {
        maxDays: 30,
        maxBytes: 20 * 1024 * 1024 // 20 Megabytes
    };

    const SERVICE_UUID = "8ce255c0-200a-11e0-ac64-0800200c9a66";
    const CHARACTERISTIC_UUID = "8ce255c1-200a-11e0-ac64-0800200c9a66";

    // Setup local binary storage instance
    function initPhotoDatabase() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open("AttendXLogDB", 1);
            request.onupgradeneeded = (e) => {
                const database = e.target.result;
                if (!database.objectStoreNames.contains("face_logs")) {
                    const store = database.createObjectStore("face_logs", { keyPath: "id", autoIncrement: true });
                    store.createIndex("timestamp", "timestamp", { unique: false });
                }
            };
            request.onsuccess = (e) => { db = e.target.result; resolve(); };
            request.onerror = (e) => reject(e.target.error);
        });
    }
    initPhotoDatabase().catch(err => console.error("Database error initialization:", err));

    function updateUIStatus(message, statusType) {
        const panel = document.getElementById('status-panel');
        panel.style.display = message ? 'block' : 'none';
        if(message) { panel.className = `status-${statusType}`; panel.textContent = message; }
    }

    function switchTab(mode) {
        currentMode = mode;
        document.getElementById('tab-reg').classList.toggle('active', mode === 'reg');
        document.getElementById('tab-login').classList.toggle('active', mode === 'login');
        document.getElementById('group-name').style.display = mode === 'reg' ? 'block' : 'none';
        document.getElementById('flow-title').textContent = mode === 'reg' ? 'Local Biometric Registration' : 'Local Attendance Portal';
        document.getElementById('actionBtn').textContent = mode === 'reg' ? 'Scan & Save Face' : 'Verify & Transmit Over BLE';
        updateUIStatus('', '');
        stopCamera();
    }

    async function startCamera() {
        if (!localStream) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: { width: 400, height: 300, facingMode: "user" } });
                const video = document.getElementById('webcam');
                video.srcObject = localStream;
                await video.play();
            } catch (err) {
                updateUIStatus("❌ Camera failed. Please grant camera access permissions.", "error");
            }
        }
    }

    function stopCamera() {
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
    }

    async function loadBiometricModels() {
        if (!modelsLoaded) {
            updateUIStatus("🤖 Downloading lightweight face models from CDN...", "loading");
            const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
            await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
            modelsLoaded = true;
        }
    }

    // Capture raw matrix dimensions directly into compressed blob format
    function captureFrameBlob(videoElement) {
        return new Promise((resolve) => {
            const canvas = document.createElement("canvas");
            canvas.width = videoElement.videoWidth || 400;
            canvas.height = videoElement.videoHeight || 300;
            const ctx = canvas.getContext("2d");
            ctx.translate(canvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
            canvas.toBlob((blob) => resolve(blob), "image/jpeg", 0.85);
        });
    }

    // Structural queuing engine
    async function writeToSlidingQueue(rollNumber, statusMsg, frameBlob) {
        if (!db || !frameBlob) return;
        const tx = db.transaction("face_logs", "readwrite");
        const store = tx.objectStore("face_logs");
        store.add({
            rollNumber: rollNumber || "UNKNOWN",
            timestamp: Date.now(),
            status: statusMsg,
            imageSize: frameBlob.size,
            imageBlob: frameBlob
        });
        tx.oncomplete = async () => { await enforceQueueConstraints(); };
    }

    async function enforceQueueConstraints() {
        if (!db) return;
        const tx = db.transaction("face_logs", "readwrite");
        const store = tx.objectStore("face_logs");
        const index = store.index("timestamp");
        const cutoffTime = Date.now() - (QUEUE_CONFIG.maxDays * 24 * 60 * 60 * 1000);
        let currentTotalBytes = 0;
        let entries = [];

        index.openCursor().onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) {
                entries.push({ id: cursor.value.id, timestamp: cursor.value.timestamp, size: cursor.value.imageSize || 0 });
                currentTotalBytes += (cursor.value.imageSize || 0);
                cursor.continue();
            } else {
                // 1. Evict based on date limit constraint
                entries.forEach(entry => { if (entry.timestamp < cutoffTime) { store.delete(entry.id); currentTotalBytes -= entry.size; } });
                
                // 2. FIFO size overflow pruning step
                let idx = 0;
                while (currentTotalBytes > QUEUE_CONFIG.maxBytes && idx < entries.length) {
                    store.delete(entries[idx].id);
                    currentTotalBytes -= entries[idx].size;
                    idx++;
                }
            }
        };
    }

    async function executeCoreBiometrics() {
        const name = document.getElementById('name').value.trim();
        const roll = document.getElementById('roll').value.trim();
        const actionBtn = document.getElementById('actionBtn');
        const video = document.getElementById('webcam');

        if (!roll || (currentMode === 'reg' && !name)) {
            updateUIStatus("⚠️ Please complete the form details first.", "error");
            return;
        }

        actionBtn.disabled = true;
        let liveSnapshotBlob = null;
        
        try {
            await startCamera();
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            // LOG IMMEDIATELY - Ensures photo storage captures frame even if face-api fails
            liveSnapshotBlob = await captureFrameBlob(video);
            
            await loadBiometricModels();
            updateUIStatus("📸 Analyzing face features... Keep still.", "loading");

            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();

            if (!detection) {
                updateUIStatus("❌ No face detected. Look directly at the camera and try again.", "error");
                await writeToSlidingQueue(roll, "FAILED - NO FACE DETECTED", liveSnapshotBlob);
                actionBtn.disabled = false;
                return;
            }

            const faceVectorArray = Array.from(detection.descriptor);

            if (currentMode === 'reg') {
                try {
                    const response = await fetch('/api/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, rollNumber: roll, faceEmbedding: faceVectorArray })
                    });
                    
                    if (response.ok) {
                        updateUIStatus(`🎉 Saved! Face data stored in database for Roll: ${roll}`, "success");
                        await writeToSlidingQueue(roll, "REGISTRATION SUCCESS", liveSnapshotBlob);
                    } else {
                        const result = await response.json();
                        updateUIStatus(`❌ Registration failed: ${result.error || 'Unknown server error'}`, "error");
                        await writeToSlidingQueue(roll, `REGISTRATION FAILED: ${result.error}`, liveSnapshotBlob);
                    }
                } catch (networkError) {
                    updateUIStatus("❌ Network error: Could not connect to registration server.", "error");
                    await writeToSlidingQueue(roll, "REGISTRATION NETWORK ERROR", liveSnapshotBlob);
                } finally {
                    stopCamera();
                    actionBtn.disabled = false;
                }
            } else {
                try {
                    const response = await fetch(`/api/student/${roll}`);
                    
                    if (!response.ok) {
                        updateUIStatus("❌ No biometric data found for this Roll Number. Sign up first!", "error");
                        await writeToSlidingQueue(roll, "VERIFY FAILED - DATA NOT FOUND", liveSnapshotBlob);
                        actionBtn.disabled = false;
                        return;
                    }

                    const profile = await response.json();
                    if (!profile.faceEmbedding) {
                        updateUIStatus("❌ Error: Student profile is missing face matrix files.", "error");
                        await writeToSlidingQueue(roll, "VERIFY FAILED - PROFILE ERROR CORRUPTION", liveSnapshotBlob);
                        actionBtn.disabled = false;
                        return;
                    }

                    const savedDescriptor = new Float32Array(profile.faceEmbedding);
                    const distance = faceapi.euclideanDistance(detection.descriptor, savedDescriptor);
                    
                    if (distance < 0.6) {
                        updateUIStatus("✅ Face matched perfectly! Activating Web Bluetooth scan...", "loading");
                        stopCamera();
                        await writeToSlidingQueue(roll, "VERIFY MATCH SUCCESS", liveSnapshotBlob);
                        await fireBleHandshake(profile.name, profile.rollNumber);
                    } else {
                        updateUIStatus(`❌ Identity match failed! Access Denied.`, "error");
                        await writeToSlidingQueue(roll, `VERIFY DENIED - DISTANCE (${distance.toFixed(3)})`, liveSnapshotBlob);
                        actionBtn.disabled = false;
                    }
                } catch (networkError) {
                    updateUIStatus("❌ Server error: Unable to fetch biometric data for verification.", "error");
                    await writeToSlidingQueue(roll, "VERIFY NETWORK EXCEPTION FAILURE", liveSnapshotBlob);
                    actionBtn.disabled = false;
                }
            }
        } catch (globalError) {
            updateUIStatus("⚠️ Unexpected application framework runtime error encountered.", "error");
            if(liveSnapshotBlob) await writeToSlidingQueue(roll, "CRITICAL EXCEPTION PIPELINE BREAK", liveSnapshotBlob);
            actionBtn.disabled = false;
        }
    }

    async function fireBleHandshake(name, roll) {
        if (!navigator.bluetooth) {
            updateUIStatus("❌ Web Bluetooth not supported on this browser. Try Chrome/Edge.", "error");
            document.getElementById('actionBtn').disabled = false;
            return;
        }
        try {
            const device = await navigator.bluetooth.requestDevice({ filters: [{ services: [SERVICE_UUID] }] });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            const characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

            const payloadString = `${name}|${roll}|00:1A:2B:3C:4D:5E`;
            const dataBuffer = new TextEncoder().encode(payloadString);
            await characteristic.writeValueWithResponse(dataBuffer);

            updateUIStatus("🎉 Attendance verified and transmitted over BLE successfully!", "success");
            setTimeout(() => { device.gatt.disconnect(); document.getElementById('actionBtn').disabled = false; }, 2000);
        } catch(e) {
            updateUIStatus(`⚠️ Biometrics passed! (Bluetooth box opened, but connection cancelled or timed out).`, "error");
            document.getElementById('actionBtn').disabled = false;
        }
    }
</script>
</body>
</html>
