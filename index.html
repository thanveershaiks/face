<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioGate - Auto-Routing Biometric Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f19; --surface: #151b2c; --border: #242f4d;
            --text: #f1f5f9; --text-muted: #64748b; --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.2); --success: #10b981; --error: #ef4444;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg); color: var(--text);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box;
        }

        .auth-card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 24px;
            width: 100%; max-width: 400px; padding: 32px; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4); text-align: center;
        }

        .logo-space { font-size: 2.5rem; margin-bottom: 8px; }
        h2 { margin: 0 0 8px 0; font-size: 1.5rem; font-weight: 700; }
        p { margin: 0 0 24px 0; color: var(--text-muted); font-size: 0.9rem; }

        .input-group { text-align: left; margin-bottom: 16px; display: none; }
        label { display: block; margin-bottom: 6px; font-size: 0.8rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #0b0f19; border: 1.5px solid var(--border); border-radius: 8px; color: var(--text); font-size: 0.95rem; outline: none; box-sizing: border-box; }

        .camera-box {
            position: relative; width: 100%; height: 200px; background: #000;
            border-radius: 16px; overflow: hidden; border: 2px solid var(--border); margin-bottom: 24px; display: none;
        }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        .button-stack { display: flex; flex-direction: column; gap: 12px; }
        .btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 14px; border: 1px solid var(--border); background: rgba(255,255,255,0.02);
            border-radius: 12px; color: var(--text); font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease;
        }
        .btn:hover { background: var(--border); border-color: var(--accent); }
        .btn-primary { background: var(--accent); border: none; box-shadow: 0 4px 14px var(--accent-glow); }
        .btn-primary:hover { background: #2563eb; }

        #status-msg { margin-top: 20px; padding: 12px; border-radius: 8px; font-size: 0.85rem; font-weight: 500; display: none; }
        .status-info { background: rgba(59, 130, 246, 0.1); color: #60a5fa; }
        .status-success { background: rgba(16, 185, 129, 0.1); color: #34d399; }
        .status-error { background: rgba(239, 68, 68, 0.1); color: #f87171; }

        .reset-link { margin-top: 20px; display: inline-block; font-size: 0.8rem; color: var(--text-muted); cursor: pointer; text-decoration: underline; }
        .reset-link:hover { color: var(--error); }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="logo-space">🛡️</div>
    <h2 id="view-title">Loading Gateway...</h2>
    <p id="view-desc">Configuring local parameters.</p>

    <div class="input-group" id="nameFieldGroup">
        <label for="username">Enter Full Name for Enrolment</label>
        <input type="text" id="username" placeholder="e.g., Jane Doe" autocomplete="off">
    </div>

    <div class="camera-box" id="cameraBox">
        <video id="webcam" autoplay muted playsinline></video>
    </div>

    <div class="button-stack">
        <button class="btn btn-primary" id="mainActionButton" onclick="handleCoreAction()">
            Proceed
        </button>
        <button class="btn" id="cameraToggleBtn" onclick="toggleCameraView()">
            📷 Toggle Live Camera View
        </button>
    </div>

    <div id="status-msg"></div>
    <span class="reset-link" onclick="clearProfileState()">Clear Saved Profile Cache</span>
</div>

<script>
    let isRegistered = false;
    let streamInstance = null;
    const CACHE_KEY = "attendx_biometric_registered";

    // Initialize application routing pipeline immediately upon DOM mounting
    window.addEventListener('DOMContentLoaded', () => {
        evaluateRoutingState();
    });

    function logStatus(message, variant) {
        const pane = document.getElementById('status-msg');
        pane.style.display = message ? 'block' : 'none';
        if (message) { pane.className = `status-${variant}`; pane.textContent = message; }
    }

    /**
     * Checks storage indicators and rewrites the interface architecture.
     */
    function evaluateRoutingState() {
        isRegistered = localStorage.getItem(CACHE_KEY) === "true";
        
        const title = document.getElementById('view-title');
        const desc = document.getElementById('view-desc');
        const nameField = document.getElementById('nameFieldGroup');
        const mainBtn = document.getElementById('mainActionButton');

        logStatus("", "");

        if (isRegistered) {
            // Direct Gateway Route: Skip registration completely
            title.textContent = "Welcome Back";
            desc.textContent = "Scan your device fingerprint key or align your face to verify.";
            nameField.style.display = "none";
            mainBtn.textContent = "🧬 Scan Biometric Key";
        } else {
            // Enrolment Route: Show setup options
            title.textContent = "Biometric Setup";
            desc.textContent = "Register your profile context to configure passkey security options.";
            nameField.style.display = "block";
            mainBtn.textContent = "💾 Save Profile & Face Vector";
        }
    }

    /**
     * Unified operational logic gate dealing with dynamic button execution loops.
     */
    async function handleCoreAction() {
        if (isRegistered) {
            await runVerificationPipeline();
        } else {
            await runRegistrationPipeline();
        }
    }

    /**
     * PIPELINE A: Complete Profile Registration
     */
    async function runRegistrationPipeline() {
        const nameInput = document.getElementById('username').value.trim();
        if (!nameInput) {
            logStatus("⚠️ A profile registration signature name is required.", "error");
            return;
        }

        logStatus("🔄 Processing cryptographic configuration vectors...", "info");

        // Simulate local facial vector processing/hardware key registration
        setTimeout(() => {
            // Set the state persistent storage flags
            localStorage.setItem(CACHE_KEY, "true");
            localStorage.setItem("cached_username", nameInput);
            
            logStatus(`🎉 Registration complete for ${nameInput}! Re-routing interface context...`, "success");
            
            // Re-route views natively without breaking application context
            setTimeout(() => {
                evaluateRoutingState();
            }, 1500);
        }, 1200);
    }

    /**
     * PIPELINE B: Rapid Verification Pipeline
     */
    async function runVerificationPipeline() {
        logStatus("🔄 Querying hardware authenticator parameters...", "info");

        if (window.PublicKeyCredential) {
            try {
                const mockChallenge = new Uint8Array(32);
                window.crypto.getRandomValues(mockChallenge);

                // Open device hardware tray layer natively
                await navigator.credentials.create({
                    publicKey: {
                        challenge: mockChallenge,
                        rp: { name: "BioGate Core", id: window.location.hostname },
                        user: { id: Uint8Array.from("1", c=>c.charCodeAt(0)), name: "user", displayName: "User" },
                        pubKeyCredParams: [{ type: "public-key", alg: -7 }],
                        authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" }
                    }
                });
                
                const cachedUser = localStorage.getItem("cached_username") || "User";
                logStatus(`✅ Identity Verified! Access granted to profile: ${cachedUser}`, "success");
            } catch (err) {
                logStatus("❌ Device key check rejected or verification timed out.", "error");
            }
        } else {
            logStatus("❌ Hardware verification unavailable. Utilize standard fallback mechanisms.", "error");
        }
    }

    /**
     * Helper to clear cached states (Useful for testing).
     */
    function clearProfileState() {
        localStorage.removeItem(CACHE_KEY);
        localStorage.removeItem("cached_username");
        if (streamInstance) toggleCameraView(); 
        evaluateRoutingState();
        logStatus("🗑️ Client browser storage profile cleared.", "info");
    }

    /**
     * Helper to manage local fallback video stream threads.
     */
    async function toggleCameraView() {
        const box = document.getElementById('cameraBox');
        const video = document.getElementById('webcam');

        if (streamInstance) {
            streamInstance.getTracks().forEach(track => track.stop());
            streamInstance = null;
            box.style.display = "none";
            return;
        }

        try {
            streamInstance = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            video.srcObject = streamInstance;
            box.style.display = "block";
        } catch (err) {
            logStatus("❌ System media capture framework blocked.", "error");
        }
    }
</script>
</body>
</html>
